  <text x="440" y="231" text-anchor="middle" font-size="11" font-weight="bold" fill="#B91C1C">BROKEN</text>
  <text x="560" y="231" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">untested</text>
  <text x="685" y="231" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">OK</text>

