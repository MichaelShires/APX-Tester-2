  <text x="440" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CMOV</text>
  <text x="560" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CFCMOV</text>
  <text x="685" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PUSH2/</text>
  <text x="685" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="white">POP2</text>

  <!-- ── Row 0: Memory operands ── -->
  <rect x="10"  y="102" width="250" height="50" fill="white"   stroke="#E2E8F0" stroke-width="1"/>
  <rect x="260" y="102" width="120" height="50" fill="#FEE2E2" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="380" y="102" width="120" height="50" fill="#FEE2E2" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="500" y="102" width="120" height="50" fill="#D1FAE5" stroke="#E2E8F0" stroke-width="1"/>
