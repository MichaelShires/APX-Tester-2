  <text x="20"  y="123" font-size="12" font-weight="bold" fill="#334155">Memory operands</text>
  <text x="20"  y="140" font-size="11" fill="#64748B">(pointer dereferences)</text>
  <text x="320" y="131" text-anchor="middle" font-size="11" font-weight="bold" fill="#B91C1C">BROKEN</text>
  <text x="440" y="131" text-anchor="middle" font-size="11" font-weight="bold" fill="#B91C1C">BROKEN</text>
  <text x="560" y="131" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">OK</text>
  <text x="685" y="131" text-anchor="middle" font-size="11" fill="#94A3B8">N/A</text>

