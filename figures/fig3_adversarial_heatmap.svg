  <rect x="10"  y="252" width="250" height="50" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="260" y="252" width="120" height="50" fill="#FEE2E2" stroke="#E2E8F0" stroke-width="1"/>
