  <rect x="380" y="452" width="120" height="50" fill="#D1FAE5" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="500" y="452" width="120" height="50" fill="#D1FAE5" stroke="#E2E8F0" stroke-width="1"/>
