  <text x="320" y="481" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">OK</text>
  <text x="440" y="481" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">OK</text>
  <text x="560" y="481" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">OK</text>
