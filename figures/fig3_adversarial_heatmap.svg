  <rect x="10" y="56" width="740" height="446" fill="none" stroke="#CBD5E1" stroke-width="1.5" rx="6"/>

  <!-- Legend -->
  <rect x="10"  y="510" width="14" height="14" fill="#FEE2E2" stroke="#FECACA" stroke-width="1" rx="2"/>
  <text x="29" y="522" font-size="11" fill="#64748B">BROKEN — pattern not emitted</text>

  <rect x="220" y="510" width="14" height="14" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1" rx="2"/>
  <text x="239" y="522" font-size="11" fill="#64748B">OK — pattern emitted correctly</text>

  <rect x="440" y="510" width="14" height="14" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="2"/>
  <text x="459" y="522" font-size="11" fill="#64748B">N/A — instruction not applicable</text>

  <rect x="640" y="510" width="14" height="14" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="2"/>
