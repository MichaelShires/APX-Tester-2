<svg xmlns="http://www.w3.org/2000/svg" width="760" height="390" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="390" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0F172A">Intel APX: Feature Flag Hierarchy</text>

  <!-- Outer APX container -->
  <rect x="15" y="44" width="730" height="334" fill="white" stroke="#CBD5E1" stroke-width="1.5" rx="8"/>
  <text x="32" y="64" font-size="12" fill="#94A3B8" font-style="italic">Intel APX</text>

  <!-- -mapxf section -->
  <rect x="28" y="70" width="464" height="296" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" rx="6"/>
  <text x="48" y="93" font-size="15" font-weight="bold" fill="#1E40AF">-mapxf</text>
  <text x="140" y="93" font-size="11" fill="#64748B"> — enables the full APX bundle</text>

  <!-- EGPR -->
  <rect x="44" y="104" width="212" height="118" fill="white" stroke="#BFDBFE" stroke-width="1.5" rx="5"/>
  <text x="150" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">EGPR</text>
  <rect x="110" y="134" width="80" height="20" fill="#DBEAFE" rx="10"/>
  <text x="150" y="149" text-anchor="middle" font-size="11" fill="#1D4ED8">+egpr</text>
  <text x="150" y="170" text-anchor="middle" font-size="10" fill="#64748B">Extended GPRs r16-r31</text>
  <text x="150" y="185" text-anchor="middle" font-size="10" fill="#64748B">Doubles the register file</text>
  <text x="150" y="200" text-anchor="middle" font-size="10" fill="#64748B">Reduces register spills</text>

  <!-- NDD -->
  <rect x="268" y="104" width="212" height="118" fill="white" stroke="#BFDBFE" stroke-width="1.5" rx="5"/>
  <text x="374" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">NDD</text>
  <rect x="334" y="134" width="80" height="20" fill="#DBEAFE" rx="10"/>
  <text x="374" y="149" text-anchor="middle" font-size="11" fill="#1D4ED8">+ndd</text>
  <text x="374" y="170" text-anchor="middle" font-size="10" fill="#64748B">New Data Destination</text>
  <text x="374" y="185" text-anchor="middle" font-size="10" fill="#64748B">3-operand instructions</text>
  <text x="374" y="200" text-anchor="middle" font-size="10" fill="#64748B">Eliminates setup MOVs</text>

  <!-- PUSH2/POP2 -->
  <rect x="44" y="234" width="212" height="118" fill="white" stroke="#BFDBFE" stroke-width="1.5" rx="5"/>
  <text x="150" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">PUSH2 / POP2</text>
  <rect x="90" y="264" width="120" height="20" fill="#DBEAFE" rx="10"/>
  <text x="150" y="279" text-anchor="middle" font-size="11" fill="#1D4ED8">+push2pop2</text>
  <text x="150" y="300" text-anchor="middle" font-size="10" fill="#64748B">Paired register push/pop</text>
  <text x="150" y="315" text-anchor="middle" font-size="10" fill="#64748B">Halves prologue/epilogue</text>
  <text x="150" y="330" text-anchor="middle" font-size="10" fill="#64748B">instruction count</text>

  <!-- PPX -->
  <rect x="268" y="234" width="212" height="118" fill="white" stroke="#BFDBFE" stroke-width="1.5" rx="5"/>
  <text x="374" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E40AF">PPX</text>
  <rect x="334" y="264" width="80" height="20" fill="#DBEAFE" rx="10"/>
  <text x="374" y="279" text-anchor="middle" font-size="11" fill="#1D4ED8">+ppx</text>
  <text x="374" y="300" text-anchor="middle" font-size="10" fill="#64748B">Push/Pop eXtended</text>
  <text x="374" y="315" text-anchor="middle" font-size="10" fill="#64748B">PUSH/POP for r16-r31</text>
  <text x="374" y="330" text-anchor="middle" font-size="10" fill="#64748B">via REX2 prefix</text>

  <!-- +cf section (outside -mapxf) -->
  <rect x="508" y="70" width="222" height="296" fill="#FFFBEB" stroke="#D97706" stroke-width="2" stroke-dasharray="7 3" rx="6"/>

  <!-- NOT in -mapxf badge -->
  <rect x="522" y="82" width="194" height="26" fill="#FEF3C7" rx="13"/>
  <text x="619" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">NOT in -mapxf</text>

  <text x="619" y="128" text-anchor="middle" font-size="15" font-weight="bold" fill="#B45309">+cf</text>
  <text x="619" y="146" text-anchor="middle" font-size="11" fill="#78716C">Conditional faulting</text>

  <!-- CFCMOV inner box -->
  <rect x="520" y="156" width="198" height="150" fill="white" stroke="#FCD34D" stroke-width="1.5" rx="5"/>
  <text x="619" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#B45309">CFCMOV</text>
  <text x="619" y="200" text-anchor="middle" font-size="10" fill="#64748B">Conditional memory access</text>
  <text x="619" y="215" text-anchor="middle" font-size="10" fill="#64748B">with fault suppression</text>
  <text x="619" y="234" text-anchor="middle" font-size="10" font-style="italic" fill="#92400E">cfcmovnel (%ptr), %reg</text>
  <text x="619" y="253" text-anchor="middle" font-size="10" fill="#64748B">Eliminates branches</text>
  <text x="619" y="268" text-anchor="middle" font-size="10" fill="#64748B">guarding memory loads</text>
  <text x="619" y="283" text-anchor="middle" font-size="10" fill="#64748B">and stores</text>

  <!-- Required invocation note -->
  <text x="619" y="316" text-anchor="middle" font-size="10" fill="#D97706" font-style="italic">-Xclang -target-feature -Xclang +cf</text>
  <text x="619" y="334" text-anchor="middle" font-size="10" fill="#92400E">1,120 CFCMOV / 634 branches</text>
  <text x="619" y="349" text-anchor="middle" font-size="10" fill="#92400E">left on table by default</text>
</svg>
